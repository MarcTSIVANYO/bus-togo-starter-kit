server:
  port: 8083

spring:
  datasource:
    url: jdbc:h2:mem:paiement;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

services:
  reservationBaseUrl: "http://localhost:8082"
  notificationBaseUrl: "http://localhost:8084"

resilience4j:
  retry:
    instances:
      paiementRetry:
        maxAttempts: 3
        waitDuration: 300ms
