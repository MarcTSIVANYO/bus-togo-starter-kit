server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:reservation;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Console H2 (option)
# http://localhost:8082/h2-console
spring.h2.console.enabled: true
spring.h2.console.path: /h2-console
